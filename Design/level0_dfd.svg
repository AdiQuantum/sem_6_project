<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Georgia, 'Times New Roman', serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#F4F6F9"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="52" fill="#1A3C5E"/>
  <text x="450" y="20" text-anchor="middle" font-size="13" fill="#AAC8E8" letter-spacing="2" font-family="Georgia">DATA FLOW DIAGRAM</text>
  <text x="450" y="40" text-anchor="middle" font-size="16" fill="#FFFFFF" font-weight="bold" letter-spacing="1">Level 0 — Context Diagram: Online Shopping Portal</text>

  <!-- ─── SYSTEM BOUNDARY ─── -->
  <rect x="280" y="120" width="340" height="370" rx="8" fill="none" stroke="#1A3C5E" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="450" y="113" text-anchor="middle" font-size="11" fill="#1A3C5E" font-style="italic">System Boundary</text>

  <!-- ═══════════ CENTRAL PROCESS ═══════════ -->
  <!-- Big circle -->
  <circle cx="450" cy="305" r="88" fill="#1A3C5E" stroke="#0D2137" stroke-width="2.5"/>
  <circle cx="450" cy="305" r="82" fill="none" stroke="#3A7EC6" stroke-width="1.5"/>
  <text x="450" y="291" text-anchor="middle" font-size="12" fill="#AED6F1" letter-spacing="1">PROCESS 0</text>
  <text x="450" y="309" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">Online</text>
  <text x="450" y="327" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">Shopping</text>
  <text x="450" y="345" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="bold">Portal</text>

  <!-- ═══════════ EXTERNAL ENTITIES ═══════════ -->

  <!-- Entity helper: rounded rect style -->

  <!-- 1. CUSTOMER (top-left) -->
  <rect x="40" y="100" width="140" height="60" rx="6" fill="#FFFFFF" stroke="#1A3C5E" stroke-width="2"/>
  <rect x="40" y="100" width="140" height="18" rx="6" fill="#1A3C5E"/>
  <rect x="40" y="108" width="140" height="10" fill="#1A3C5E"/>
  <text x="110" y="113" text-anchor="middle" font-size="10" fill="#AED6F1" letter-spacing="1">ENTITY</text>
  <text x="110" y="141" text-anchor="middle" font-size="14" fill="#1A3C5E" font-weight="bold">Customer</text>

  <!-- 2. ADMIN (bottom-left) -->
  <rect x="40" y="440" width="140" height="60" rx="6" fill="#FFFFFF" stroke="#1A3C5E" stroke-width="2"/>
  <rect x="40" y="440" width="140" height="18" rx="6" fill="#1A3C5E"/>
  <rect x="40" y="448" width="140" height="10" fill="#1A3C5E"/>
  <text x="110" y="453" text-anchor="middle" font-size="10" fill="#AED6F1" letter-spacing="1">ENTITY</text>
  <text x="110" y="481" text-anchor="middle" font-size="14" fill="#1A3C5E" font-weight="bold">Admin</text>

  <!-- 3. PAYMENT SYSTEM (top-right) -->
  <rect x="718" y="100" width="152" height="60" rx="6" fill="#FFFFFF" stroke="#1A3C5E" stroke-width="2"/>
  <rect x="718" y="100" width="152" height="18" rx="6" fill="#1A3C5E"/>
  <rect x="718" y="108" width="152" height="10" fill="#1A3C5E"/>
  <text x="794" y="113" text-anchor="middle" font-size="10" fill="#AED6F1" letter-spacing="1">ENTITY</text>
  <text x="794" y="136" text-anchor="middle" font-size="13" fill="#1A3C5E" font-weight="bold">Payment</text>
  <text x="794" y="153" text-anchor="middle" font-size="13" fill="#1A3C5E" font-weight="bold">System</text>

  <!-- 4. EMAIL SERVICE (bottom-right) -->
  <rect x="718" y="440" width="152" height="60" rx="6" fill="#FFFFFF" stroke="#1A3C5E" stroke-width="2"/>
  <rect x="718" y="440" width="152" height="18" rx="6" fill="#1A3C5E"/>
  <rect x="718" y="448" width="152" height="10" fill="#1A3C5E"/>
  <text x="794" y="453" text-anchor="middle" font-size="10" fill="#AED6F1" letter-spacing="1">ENTITY</text>
  <text x="794" y="476" text-anchor="middle" font-size="13" fill="#1A3C5E" font-weight="bold">Email</text>
  <text x="794" y="493" text-anchor="middle" font-size="13" fill="#1A3C5E" font-weight="bold">Service</text>

  <!-- ═══════════ DATA FLOWS ═══════════ -->

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#1A3C5E"/>
    </marker>
    <marker id="arr-green" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#1E8449"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#B7770D"/>
    </marker>
  </defs>

  <!-- ── Customer → System (going RIGHT, upper) ── -->
  <!-- Login / Register / Search / Cart / Order -->
  <line x1="180" y1="118" x2="355" y2="238" stroke="#1A3C5E" stroke-width="1.8" marker-end="url(#arr)"/>
  <!-- label background -->
  <rect x="192" y="148" width="148" height="46" rx="4" fill="#DDEEFF" opacity="0.92"/>
  <text x="266" y="163" text-anchor="middle" font-size="9.5" fill="#1A3C5E" font-weight="bold">Login / Register details</text>
  <text x="266" y="176" text-anchor="middle" font-size="9.5" fill="#1A3C5E">Search query, Filters</text>
  <text x="266" y="189" text-anchor="middle" font-size="9.5" fill="#1A3C5E">Cart actions, Order info</text>

  <!-- System → Customer (going LEFT, lower) -->
  <line x1="362" y1="372" x2="180" y2="151" stroke="#1E8449" stroke-width="1.8" marker-end="url(#arr-green)" stroke-dasharray="6,3"/>
  <rect x="192" y="222" width="148" height="46" rx="4" fill="#D5F5E3" opacity="0.92"/>
  <text x="266" y="237" text-anchor="middle" font-size="9.5" fill="#1E5631" font-weight="bold">Product listings</text>
  <text x="266" y="250" text-anchor="middle" font-size="9.5" fill="#1E5631">Order confirmation</text>
  <text x="266" y="263" text-anchor="middle" font-size="9.5" fill="#1E5631">Order status / History</text>

  <!-- ── Admin → System (going RIGHT-UP) ── -->
  <line x1="180" y1="462" x2="355" y2="372" stroke="#1A3C5E" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="185" y="386" width="148" height="46" rx="4" fill="#DDEEFF" opacity="0.92"/>
  <text x="259" y="401" text-anchor="middle" font-size="9.5" fill="#1A3C5E" font-weight="bold">Product / Category data</text>
  <text x="259" y="414" text-anchor="middle" font-size="9.5" fill="#1A3C5E">Add / Edit / Delete</text>
  <text x="259" y="427" text-anchor="middle" font-size="9.5" fill="#1A3C5E">Order status updates</text>

  <!-- System → Admin (going LEFT, lower) -->
  <line x1="362" y1="390" x2="180" y2="476" stroke="#1E8449" stroke-width="1.8" marker-end="url(#arr-green)" stroke-dasharray="6,3"/>
  <rect x="185" y="434" width="148" height="36" rx="4" fill="#D5F5E3" opacity="0.92"/>
  <text x="259" y="449" text-anchor="middle" font-size="9.5" fill="#1E5631" font-weight="bold">Dashboard stats</text>
  <text x="259" y="462" text-anchor="middle" font-size="9.5" fill="#1E5631">Orders list, Users list</text>

  <!-- ── System → Payment (going RIGHT-UP) ── -->
  <line x1="538" y1="238" x2="718" y2="148" stroke="#1A3C5E" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="560" y="148" width="136" height="36" rx="4" fill="#DDEEFF" opacity="0.92"/>
  <text x="628" y="163" text-anchor="middle" font-size="9.5" fill="#1A3C5E" font-weight="bold">Payment request</text>
  <text x="628" y="177" text-anchor="middle" font-size="9.5" fill="#1A3C5E">Amount, Order ID</text>

  <!-- Payment → System (going LEFT-DOWN) -->
  <line x1="718" y1="160" x2="538" y2="258" stroke="#B7770D" stroke-width="1.8" marker-end="url(#arr-orange)" stroke-dasharray="6,3"/>
  <rect x="560" y="196" width="136" height="36" rx="4" fill="#FEF9E7" opacity="0.92"/>
  <text x="628" y="211" text-anchor="middle" font-size="9.5" fill="#784212" font-weight="bold">Payment success /</text>
  <text x="628" y="224" text-anchor="middle" font-size="9.5" fill="#784212">failure response</text>

  <!-- ── System → Email (going RIGHT-DOWN) ── -->
  <line x1="538" y1="372" x2="718" y2="452" stroke="#1A3C5E" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="556" y="384" width="144" height="36" rx="4" fill="#DDEEFF" opacity="0.92"/>
  <text x="628" y="399" text-anchor="middle" font-size="9.5" fill="#1A3C5E" font-weight="bold">Order confirmation</text>
  <text x="628" y="412" text-anchor="middle" font-size="9.5" fill="#1A3C5E">trigger + user email</text>

  <!-- Email → System (optional ack, going LEFT-UP) -->
  <line x1="718" y1="462" x2="538" y2="385" stroke="#B7770D" stroke-width="1.8" marker-end="url(#arr-orange)" stroke-dasharray="6,3"/>
  <rect x="556" y="425" width="144" height="26" rx="4" fill="#FEF9E7" opacity="0.92"/>
  <text x="628" y="443" text-anchor="middle" font-size="9.5" fill="#784212">Delivery status / Ack</text>

  <!-- ═══════════ LEGEND ═══════════ -->
  <rect x="30" y="560" width="840" height="48" rx="6" fill="#FFFFFF" stroke="#D0D8E4" stroke-width="1"/>
  <text x="55" y="576" font-size="10" fill="#555" font-style="italic" font-weight="bold">Legend:</text>

  <!-- Entity -->
  <rect x="110" y="563" width="16" height="12" rx="2" fill="#FFFFFF" stroke="#1A3C5E" stroke-width="1.5"/>
  <text x="132" y="574" font-size="10" fill="#333">External Entity</text>

  <!-- Process -->
  <circle cx="228" cy="569" r="7" fill="#1A3C5E"/>
  <text x="242" y="574" font-size="10" fill="#333">Process</text>

  <!-- Arrow to system -->
  <line x1="300" y1="569" x2="330" y2="569" stroke="#1A3C5E" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="337" y="574" font-size="10" fill="#333">Data flow (input to system)</text>

  <!-- Arrow from system -->
  <line x1="510" y1="569" x2="540" y2="569" stroke="#1E8449" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="547" y="574" font-size="10" fill="#333">Data flow (output from system)</text>

  <!-- Arrow response -->
  <line x1="710" y1="569" x2="740" y2="569" stroke="#B7770D" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="747" y="574" font-size="10" fill="#333">Response / Ack</text>

  <!-- second legend row -->
  <text x="55" y="598" font-size="9.5" fill="#777" font-style="italic">Note: Dashed arrows = outgoing responses. Solid arrows = incoming data/requests. All flows pass through the central system process.</text>

</svg>
